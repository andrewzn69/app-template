name: Publish App Template Helm Chart

on:
  push:
    branches: [master]
    paths:
      - "Chart.yaml"
      - "templates/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version from Chart.yaml
        id: chart_version
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Add common dependency repo
        run: |
          helm dependency update .

      - name: Package chart
        run: |
          helm package .

      - name: Push to GHCR
        run: |
          helm push app-template-${{ steps.chart_version.outputs.version }}.tgz oci://ghcr.io/andrewzn69
